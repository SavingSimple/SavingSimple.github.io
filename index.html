/* red → amber → green interpolation for the live dashboard */
const STOPS = [[220,38,38],[234,179,8],[14,124,66]];
const lerpColor = (t) => {
  t = Math.max(0, Math.min(1, t));
  const seg = t < 0.5 ? 0 : 1, lt = t < 0.5 ? t / 0.5 : (t - 0.5) / 0.5;
  const a = STOPS[seg], b = STOPS[seg + 1];
  const c = a.map((v, i) => Math.round(v + (b[i] - v) * lt));
  return `rgb(${c[0]},${c[1]},${c[2]})`;
};

/* ═══════════════════════ MINI ROUTER (hash-based) ═══════════════════════ */
let navState = null;
const RouterContext = createContext(null);
function Router({ children }) {
  const getPath = () => decodeURIComponent(window.location.hash.replace(/^#/, '')) || '/';
  const [path, setPath] = useState(getPath());
  useEffect(() => {
    const onHash = () => { setPath(getPath()); window.scrollTo(0, 0); };
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);
  const navigate = useCallback((to, opts) => {
    navState = (opts && opts.state) ? opts.state : null;
    window.location.hash = to;
  }, []);
  return <RouterContext.Provider value={{ path, navigate }}>{children}</RouterContext.Provider>;
}
const useNavigate   = () => useContext(RouterContext).navigate;
const usePath       = () => useContext(RouterContext).path;
const useLocation   = () => ({ pathname: usePath(), state: navState });
function Link({ to, children, className, style, onClick, ...rest }) {
  return <a href={'#' + to} className={className} style={style} onClick={onClick} {...rest}>{children}</a>;
}
function NavLink({ to, children, className }) {
  const path = usePath();
  const isActive = path === to;
  const cls = typeof className === 'function' ? className({ isActive }) : className;
  return <a href={'#' + to} className={cls}>{children}</a>;
}

const CartContext = createContext(null);
function CartProvider({ children }) {
  const [items, setItems] = useState([]);
  const [drawerOpen, setDrawerOpen] = useState(false);
  const addItem = useCallback((product) => {
    setItems(prev => prev.find(i => i.id === product.id) ? prev : [...prev, { ...product, quantity: 1 }]);
    setDrawerOpen(true);
  }, []);
  const removeItem = useCallback((id) => setItems(prev => prev.filter(i => i.id !== id)), []);
  const clearCart = useCallback(() => setItems([]), []);
  const total = items.reduce((s, i) => s + i.price * i.quantity, 0);
  const count = items.length;
  return <CartContext.Provider value={{ items, addItem, removeItem, clearCart, total, count, drawerOpen, setDrawerOpen }}>{children}</CartContext.Provider>;
}
const useCart = () => useContext(CartContext);

function useIntersection(options = {}) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setVisible(true); obs.disconnect(); } }, { threshold: 0.15, ...options });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return [ref, visible];
}

/* ═══════════════════════ SHARED COMPONENTS ═══════════════════════ */
function AnimatedSection({ children, className = '', delay = 0, animation = '', style }) {
  const [ref, visible] = useIntersection();
  const merged = { ...(style || {}), ...(visible && delay ? { animationDelay: delay + 's' } : {}) };
  return <div ref={ref} className={`animated${visible ? ' in' + (animation ? ' ' + animation : '') : ''} ${className}`} style={merged}>{children}</div>;
}

const aud = (n) => (n < 0 ? '−' : '') + 'A$' + Math.abs(n).toLocaleString('en-AU');

function HeroDashboard() {
  const [p, setP] = useState(0);
  useEffect(() => {
    if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) { setP(1); return; }
    let start = null, raf;
    const DUR = 4200, HOLD = 1500, CYCLE = DUR + HOLD;
    const ease = (x) => (x < 0.5 ? 2 * x * x : 1 - Math.pow(-2 * x + 2, 2) / 2);
    const tick = (ts) => {
      if (start === null) start = ts;
      const e = (ts - start) % CYCLE;
      setP(e < DUR ? ease(e / DUR) : 1);
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, []);
  const barColor = lerpColor(p);
  const balance = Math.round(-2340 + (3420 - -2340) * p);
  const savings = Math.round(847 * p);
  const score = Math.round(34 + (92 - 34) * p);
  const pct = Math.round(p * 100);
  const balanceColor = (b) => {
    if (b <= 0) return lerpColor(0);                          // negative → red
    if (b <= 1500) return lerpColor(0.5);                     // $0–$1500 → yellow
    return lerpColor(0.5 + (b - 1500) / 3840);               // $1500–$3420 → yellow→green
  };
  const savingsColor = (s) => {
    if (s <= 200) return lerpColor(0.5);
    return lerpColor(0.5 + (s - 200) / 1294);
  };
  return (
    <div className="dash-card">
      <div className="dash-card__header"><span className="dash-card__title">My Finances</span><img src={logo} alt="SavingSimple" className="dash-card__logo" /></div>
      <p className="dash-card__balance-label">Current Balance</p>
      <div className="dash-card__balance" style={{ color: balanceColor(balance) }}>{(balance < 0 ? '−' : '') + '$' + Math.abs(balance).toLocaleString('en-AU')}</div>
      <div className="dash-card__rows">
        <div className="dash-card__row"><span className="dash-card__row-label">Monthly Savings</span><span className="dash-card__row-value" style={{ color: savingsColor(savings) }}>{aud(savings)}</span></div>
        <div className="dash-card__row"><span className="dash-card__row-label">Financial Score</span><span className="dash-card__row-value" style={{ color: barColor }}>{score} / 100</span></div>
      </div>
      <div>
        <div className="dash-card__bar-label"><span>Financial Control</span><span style={{ color: barColor, fontFamily:'var(--font-mono)', fontWeight:700 }}>{pct}%</span></div>
        <div className="dash-card__bar-track"><div className="dash-card__bar-fill" style={{ width: `${pct}%`, background: barColor, transition: 'none' }} /></div>
      </div>
    </div>
  );
}

function ProductCarousel() {
  const [idx, setIdx] = useState(0);
  const [slideW, setSlideW] = useState(null);
  const viewRef = useRef(null);
  const GAP = 20;
  const VISIBLE = 3;
  const n = products.length;
  const max = n - VISIBLE;

  useEffect(() => {
    const measure = () => {
      if (viewRef.current) {
        setSlideW((viewRef.current.offsetWidth - GAP * (VISIBLE - 1)) / VISIBLE);
      }
    };
    measure();
    window.addEventListener('resize', measure);
    return () => window.removeEventListener('resize', measure);
  }, []);

  const offset = slideW != null ? -(idx * (slideW + GAP)) : 0;
  const prev = () => setIdx(i => Math.max(0, i - 1));
  const next = () => setIdx(i => Math.min(max, i + 1));

  return (
    <div className="carousel">
      <button className="carousel__btn" onClick={prev} aria-label="Previous" disabled={idx === 0} style={{ opacity: idx === 0 ? 0.35 : 1 }}>
        <Icon name="chevron-left" size={22} stroke={2.5} />
      </button>
      <div className="carousel__viewport" ref={viewRef}>
        <div className="carousel__track" style={{ transform: `translateX(${offset}px)`, gap: `${GAP}px` }}>
          {products.map(p => (
            <div key={p.id} className="carousel__slide" style={slideW ? { flex: `0 0 ${slideW}px` } : {}}>
              <ProductCard product={p} />
            </div>
          ))}
        </div>
      </div>
      <button className="carousel__btn" onClick={next} aria-label="Next" disabled={idx === max} style={{ opacity: idx === max ? 0.35 : 1 }}>
        <Icon name="chevron-right" size={22} stroke={2.5} />
      </button>
    </div>
  );
}

function BundlePreviewStrip() {

      <p style={{ fontSize:'0.68rem', fontWeight:700, letterSpacing:'0.1em', textTransform:'uppercase', color:'var(--text-dim)', marginBottom:'0.875rem' }}>What's inside</p>

        {products.map((p, i) => {
          const d = Math.min(Math.abs(i - cx), SCALE.length - 1);

/* ═══════════════════════ CONTACT ═══════════════════════ */
function Contact() {
  const [form, setForm] = useState({ name:'', email:'', subject:'', message:'' });
  const [sent, setSent] = useState(false);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const handleChange = e => setForm(f => ({ ...f, [e.target.name]: e.target.value }));
  const handleSubmit = async (e) => {
    e.preventDefault();
    setLoading(true); setError('');
    try {
      const res = await fetch('https://formspree.io/info@savingsimple.com.au', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
        body: JSON.stringify({ name: form.name, _replyto: form.email, subject: form.subject, message: form.message }),
      });
      const data = await res.json();
      if (res.ok) { setSent(true); }
      else { setError(data.error || 'Something went wrong. Please try again or email us directly.'); }
    } catch {
      setError('Could not send — please email us directly at info@savingsimple.com.au');
    } finally { setLoading(false); }
  };
  return (
    <div className="page">
      <div className="page-header container">
        <p className="page-header__label">Get in touch</p><h1 className="page-header__title">Contact us</h1>
        <p className="page-header__sub">Have a question about a product, your order, or anything else? We usually respond within 24 hours on weekdays.</p>
      </div>
      <div className="contact">
        <AnimatedSection>
          {sent ? (
            <div className="contact__success" style={{ padding:'2rem', fontSize:'1rem' }}>
              <span style={{ display:'inline-flex', alignItems:'center', justifyContent:'center', width:'2.5rem', height:'2.5rem', borderRadius:'50%', background:'rgba(14,124,66,0.12)', color:'var(--accent)', marginBottom:'0.75rem' }}><Icon name="check" size={22} /></span>
              <p style={{ fontWeight:600, marginBottom:'0.25rem' }}>Message received!</p>
              <p style={{ color:'var(--text-muted)', fontSize:'0.9rem' }}>We will get back to you at {form.email} within 24 hours.</p>
            </div>
          ) : (
            <form className="contact__form" onSubmit={handleSubmit}>
              <div className="form-group"><label className="form-label" htmlFor="c-name">Your name</label><input id="c-name" name="name" className="form-input" type="text" placeholder="Jane Smith" value={form.name} onChange={handleChange} required /></div>
              <div className="form-group"><label className="form-label" htmlFor="c-email">Email address</label><input id="c-email" name="email" className="form-input" type="email" placeholder="jane@example.com" value={form.email} onChange={handleChange} required /></div>
              <div className="form-group"><label className="form-label" htmlFor="c-subject">Subject</label>
                <select id="c-subject" name="subject" className="form-input" value={form.subject} onChange={handleChange} required>
                  <option value="">Select a subject</option><option value="order">Order or delivery issue</option><option value="product">Product question</option><option value="refund">Refund request</option><option value="other">Something else</option>
                </select>
              </div>
              <div className="form-group"><label className="form-label" htmlFor="c-message">Message</label><textarea id="c-message" name="message" className="form-input" placeholder="Tell us what you need help with…" value={form.message} onChange={handleChange} required /></div>
              {error && <p style={{ fontSize:'0.85rem', color:'var(--stress)', marginBottom:'0.75rem' }}>{error}</p>}
              <button type="submit" className="btn btn-primary btn-lg btn-full" disabled={loading}>{loading ? 'Sending…' : 'Send message →'}</button>
            </form>
          )}
        </AnimatedSection>
        <AnimatedSection style={{ marginTop:'3rem', padding:'1.5rem', background:'var(--bg-card)', border:'1px solid var(--border)', borderRadius:'var(--r-lg)' }}>
          <p style={{ fontSize:'0.75rem', fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase', color:'var(--text-dim)', marginBottom:'0.75rem' }}>Quick answers</p>
          <p style={{ fontSize:'0.9rem', color:'var(--text-muted)', lineHeight:1.7 }}>For the fastest answer, check our <a href="#/faq" style={{ color:'var(--accent)' }}>FAQ page</a> — it covers order delivery, how the tools work, and our refund policy.</p>
          <p style={{ fontSize:'0.9rem', color:'var(--text-muted)', lineHeight:1.7, marginTop:'0.75rem' }}>Or email us directly at <a href="mailto:info@savingsimple.com.au" style={{ color:'var(--accent)', fontWeight:500 }}>info@savingsimple.com.au</a></p>
        </AnimatedSection>
      </div>
    </div>
  );
}

/* ═══════════════════════ APP / ROUTER ═══════════════════════ */
function App() {
  const path = usePath();
  let page;
  if (path === '/') page = <Home />;
  else if (path === '/shop') page = <Shop />;
  else if (path.indexOf('/product/') === 0) page = <ProductDetail slug={path.split('/')[2]} />;
  else if (path === '/cart') page = <CartPage />;
  else if (path === '/checkout') page = <Checkout />;
  else if (path === '/order-confirmation') page = <OrderConfirmation />;
  else if (path === '/about') page = <About />;
  else if (path === '/contact') page = <Contact />;
  else if (path === '/faq') page = <FAQ />;
  else if (path === '/refund-policy') page = <RefundPolicy />;
  else if (path === '/privacy-policy') page = <PrivacyPolicy />;
  else page = <Home />;
  return (
    <React.Fragment>
      <Navbar />
      <CartDrawer />
      <main>{page}</main>
      <Footer />
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <Router><CartProvider><App /></CartProvider></Router>
);
